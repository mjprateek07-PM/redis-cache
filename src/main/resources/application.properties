# =============================================================
# Spring Application
# =============================================================
spring.application.name=redis-cache-demo

# =============================================================
# MySQL / JPA Configuration
# =============================================================
spring.datasource.url=jdbc:mysql://localhost:3307/userdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=appuser
spring.datasource.password=apppass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.pool-name=HikariPool-UserDB
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.open-in-view=false

# =============================================================
# Redis Cluster Configuration
# =============================================================
spring.data.redis.timeout=5000ms

spring.data.redis.lettuce.pool.max-active=20
spring.data.redis.lettuce.pool.max-idle=10
spring.data.redis.lettuce.pool.min-idle=5
spring.data.redis.lettuce.pool.max-wait=-1ms
spring.data.redis.lettuce.cluster.refresh.adaptive=true
spring.data.redis.lettuce.cluster.refresh.period=30s

# =============================================================
# Cache Configuration
# =============================================================
spring.cache.type=redis
spring.cache.redis.time-to-live=600000
spring.cache.redis.cache-null-values=false

# =============================================================
# Actuator (Observability)
# =============================================================
management.endpoints.web.exposure.include=health,info,metrics,caches
management.endpoint.health.show-details=always
management.health.redis.enabled=true

# =============================================================
# Logging
# =============================================================
logging.level.root=INFO
logging.level.com.distributed.cache=DEBUG
logging.level.org.springframework.cache=TRACE
logging.level.org.springframework.data.redis=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level [%X{instanceId}] %logger{36} - %msg%n

# =============================================================
# App-level Config
# =============================================================
app.instance-id=${INSTANCE_ID:instance-1}
server.port=${SERVER_PORT:9090}

