# ============================================================
# Redis Node Configuration (used by all 6 nodes)
# Port is passed via command-line: redis-server /etc/redis/redis.conf --port 7001
# ============================================================

# Cluster mode
cluster-enabled yes
cluster-config-file /data/nodes.conf
cluster-node-timeout 5000

# Persistence (AOF for durability)
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# Data directory
dir /data

# Allow reads from replicas (for read scaling)
replica-read-only yes

# Memory policy when full
maxmemory-policy allkeys-lru

# Logging
loglevel notice
logfile ""

# Bind to all interfaces (required inside Docker)
bind 0.0.0.0

# Disable protected mode (Docker networking)
protected-mode no

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128
